fragment ClusterFields on Cluster {
  ... IBaseProductFields
  clusterId
  categoryId
  attributes {
    ... AttributeResultProductResponseFields
  }
  category {
    ... CategoryMinimalFields
  }
  categoryPath {
    ... CategoryMinimalFields
  }
  products {
    ... ProductFields
  }
  createdAt
  lastModifiedAt
  options {
    ... ClusterOptionFields
  }
  defaultProduct {
    ... ProductFields
  }
  config {
    ... ClusterConfigFields
  }
}