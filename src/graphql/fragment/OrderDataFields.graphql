fragment OrderDataFields on Order {
  id
  userId
  accountManagerId
  cartId
  channelId
  uuid
  debtorId
  status
  type
  source
  email
  emailDate
  remarks
  reference
  extra3
  extra4
  currency
  currencyRatio
  language
  createdAt
  statusDate
  total {
    ... OrderTotalsFields
  }
  invoiceUserId
  validUntil
  companyId
  sources {
    ... SourceFields
  }
  items {
    quantity
    class
    productId
    sku
    isBonus
    name
    supplier
    supplierCode
    manufacturer
    manufacturerCode
    eanCode
  }
}