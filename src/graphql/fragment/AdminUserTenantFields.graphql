fragment AdminUserTenantFields on AdminUserTenant {
  id
  tenant
  name
  default
  createdAt
  createdBy
  lastModifiedAt
  lastModifiedBy
  user {
    id
    email
    gender
    firstName
    middleName
    lastName
    language
    phone
    job
    createdAt
    createdBy
    lastModifiedAt
    lastModifiedBy
  }
  tenantInfo {
    ... TenantFields
  }
}
