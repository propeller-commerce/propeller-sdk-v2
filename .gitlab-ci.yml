# GitLab CI/CD Configuration
# This pipeline automatically mirrors the repository to GitHub

stages:
  - mirror
  - release
  - publish

# Mirror to GitHub
# This job runs whenever code is pushed to develop or main branches
mirror_to_github:
  stage: mirror
  image: 
    name: alpine/git:latest  # Lightweight and git is pre-installed
    entrypoint: [""]
  only:
    - develop
    - main
    - master
  before_script:
    - git --version
  script:
    - echo "Mirroring to GitHub..."
    - git config --global user.email "ci@propeller-commerce.com"
    - git config --global user.name "GitLab CI"
    - git remote add github https://${GITHUB_TOKEN}@github.com/propeller-commerce/propeller-sdk-v2.git || true
    # GitLab clones shallow by default; a shallow history + thin pack against
    # the divergent GitHub mirror causes "remote unpack failed: index-pack
    # failed". Unshallow so the full object graph is present locally, do NOT
    # fetch the GitHub remote (that is what makes git deltify the pack against
    # objects GitHub may not have), and push a complete (--no-thin) pack.
    - git fetch origin --unshallow || git fetch origin || true
    - git push --no-thin github HEAD:refs/heads/${CI_COMMIT_REF_NAME} --force
    - git push --no-thin github --tags --force
  when: on_success
  allow_failure: false

# Automatic GitHub Release, driven from GitLab (the source of truth).
#
# Why GitLab-driven and not a GitHub Action: the GitHub repo is a one-way
# force-pushed mirror. A GitHub Action that creates tags/commits would be
# clobbered by the next mirror push (and reintroduce the divergence that
# caused the index-pack failure). So the release is cut here, after the
# mirror, and pushed to the same GitHub remote.
#
# Gate (fires a release ONLY when ALL hold):
#   * package.json "version" has no matching `v<version>` tag yet (idempotent
#     — safe to run on every push; re-runs are a clean no-op)
#   * the CHANGELOG.md section for that version is NOT marked "Unreleased"
#     (honours the deliberate-unreleased policy: 0.10.0 will NOT release until
#     the version is bumped or the Unreleased marker is dropped)
#
# Requires CI variable GITHUB_TOKEN with `repo` scope (already used by the
# mirror job) — it is reused here for the Releases API.
release_to_github:
  stage: release
  image:
    name: alpine/git:latest  # no node; version parsed with sed/grep
    entrypoint: [""]
  only:
    - master
    - main
  needs:
    - mirror_to_github
  before_script:
    - apk add --no-cache jq curl >/dev/null 2>&1 || true
  script:
    - echo "Evaluating release gate..."
    # Parse "version" from package.json without node (image has none).
    - VERSION=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -n1)
    - 'echo "package.json version: ${VERSION}"'
    - test -n "$VERSION" || { echo "Could not parse version; aborting."; exit 1; }
    - TAG="v${VERSION}"
    # Idempotency: if the tag already exists on the GitHub mirror, do nothing.
    - git remote add github https://${GITHUB_TOKEN}@github.com/propeller-commerce/propeller-sdk-v2.git || true
    - |
      if git ls-remote --tags github "refs/tags/${TAG}" | grep -q "${TAG}"; then
        echo "Tag ${TAG} already on GitHub — release already cut, nothing to do.";
        exit 0;
      fi
    # Unreleased gate: skip if the CHANGELOG section for this version says
    # "Unreleased" (e.g. "## [0.10.0] - Unreleased").
    - |
      if grep -Eiq "^##[[:space:]]*\[${VERSION}\][^\n]*unreleased" CHANGELOG.md; then
        echo "CHANGELOG marks ${VERSION} as Unreleased — skipping release per policy.";
        exit 0;
      fi
    # Extract this version's CHANGELOG section as the release body. From the
    # "## [VERSION]" heading up to (but not including) the next "## [" heading.
    - |
      awk -v ver="$VERSION" '
        $0 ~ ("^## [[]" ver "[]]") {grab=1; next}
        grab && $0 ~ "^## [[]" {exit}
        grab {print}
      ' CHANGELOG.md > RELEASE_BODY.md
    - test -s RELEASE_BODY.md || { echo "Empty CHANGELOG section for ${VERSION}; aborting."; exit 1; }
    - 'echo "--- release body ---"; cat RELEASE_BODY.md'
    # Create and push the annotated tag on the mirrored commit.
    - git config --global user.email "ci@propeller-commerce.com"
    - git config --global user.name "GitLab CI"
    - git tag -a "${TAG}" -m "Release ${TAG}" || true
    - git push --no-thin github "refs/tags/${TAG}"
    # Create the GitHub Release via the REST API (read-only on the repo tree;
    # never commits back). jq builds a safe JSON payload from the body file.
    - |
      PAYLOAD=$(jq -n --arg tag "$TAG" --arg name "$TAG" \
        --rawfile body RELEASE_BODY.md \
        '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:false}')
      HTTP=$(curl -sS -o resp.json -w "%{http_code}" -X POST \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        -H "Accept: application/vnd.github+json" \
        https://api.github.com/repos/propeller-commerce/propeller-sdk-v2/releases \
        -d "$PAYLOAD")
      echo "GitHub API HTTP ${HTTP}"; cat resp.json
      case "$HTTP" in 2*) echo "Release ${TAG} created.";; *) echo "Release API call failed."; exit 1;; esac
  when: on_success
  allow_failure: true

# Publish to the public npm registry as @propeller-commerce/propeller-sdk-v2.
#
# Gate mirrors release_to_github so the two release artifacts stay in lockstep:
#   * package.json "version" parses
#   * the CHANGELOG.md section for that version is NOT marked "Unreleased"
#   * idempotent skip if that version is already on npm (the npm analogue of
#     release_to_github's `git ls-remote --tags` check) — safe on every push
#
# prepublishOnly (npm run validate) and prepack (npm run build) run
# automatically during `npm publish`, so a broken build aborts the publish.
#
# Requires CI variable NPM_TOKEN (masked + protected) — an automation/granular
# token with publish rights to the @propeller-commerce scope.
release_to_npm:
  stage: publish
  image: node:20-alpine
  only:
    - master
    - main
  needs:
    - release_to_github
  before_script:
    - apk add --no-cache git >/dev/null 2>&1 || true
  script:
    - PKG="@propeller-commerce/propeller-sdk-v2"
    - VERSION=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -n1)
    - 'echo "package.json version: ${VERSION}"'
    - test -n "$VERSION" || { echo "Could not parse version; aborting."; exit 1; }
    # Unreleased gate: skip if the CHANGELOG section says "Unreleased".
    - |
      if grep -Eiq "^##[[:space:]]*\[${VERSION}\][^\n]*unreleased" CHANGELOG.md; then
        echo "CHANGELOG marks ${VERSION} as Unreleased — skipping npm publish per policy.";
        exit 0;
      fi
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    # Idempotency: if this version is already on npm, do nothing.
    - |
      if npm view "${PKG}@${VERSION}" version >/dev/null 2>&1; then
        echo "${PKG}@${VERSION} already published — nothing to do.";
        exit 0;
      fi
    - npm ci
    - npm publish --access public
  when: on_success
  allow_failure: true

